<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L.I.T.H.O.S.</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo-stud"></div>
    <div class="logo-stud"></div>
    <div class="logo-stud"></div>
    <h1>L.I.T.H.O.S.</h1>
    <p class="subtitle">Lego Identification Through Home Online Systems</p>
    <div class="logo-stud"></div>
    <div class="logo-stud"></div>
    <div class="logo-stud"></div>
  </header>

  <main>
    <!-- Camera column -->
    <section class="camera-panel">
      <div class="camera-frame">
        <img id="camera-stream" src="/stream" alt="Camera preview" />
        <div id="scan-flash" class="scan-flash hidden"></div>
      </div>
      <div class="camera-controls">
        <button id="scan-btn" class="btn-scan" onclick="scan()">
          <span class="btn-icon">&#9654;</span> SCAN
        </button>
        <label class="btn-upload" for="upload-input">
          &#128247; Upload Image
        </label>
        <input id="upload-input" type="file" accept="image/*" onchange="uploadImage(event)" />
      </div>
    </section>

    <!-- Results column -->
    <section class="results-panel">
      <div id="status-bar" class="status-bar status-idle">
        Ready — point camera at a LEGO piece and press SCAN
      </div>

      <div id="top-result" class="top-result hidden">
        <div class="top-result-image-wrap">
          <img id="top-img" src="" alt="Part image" />
        </div>
        <div class="top-result-info">
          <div class="part-name" id="top-name"></div>
          <div class="part-id">Part #<span id="top-id"></span></div>
          <div class="confidence-bar-wrap">
            <div class="confidence-label">Confidence</div>
            <div class="confidence-bar">
              <div id="confidence-fill" class="confidence-fill"></div>
            </div>
            <div id="confidence-pct" class="confidence-pct"></div>
          </div>
        </div>
      </div>

      <div id="alt-results" class="alt-results hidden">
        <h3>Other possibilities</h3>
        <ul id="alt-list"></ul>
      </div>

      <div id="error-box" class="error-box hidden"></div>

      <div id="no-result" class="no-result hidden">
        No match found. Try repositioning the piece or improving the lighting.
      </div>
    </section>
  </main>

  <footer>
    <span>L.I.T.H.O.S.</span>
    <span class="footer-dot">&#9632;</span>
    <span>Powered by <a href="https://brickognize.com" target="_blank">Brickognize</a></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
